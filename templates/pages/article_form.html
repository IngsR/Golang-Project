{{ template "header" . }}
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet" />
<style>
    .ql-container {
        font-family: inherit;
        font-size: 1rem;
        min-height: 250px;
        background: var(--surface, #ffffff);
        border-color: var(--border, #e2e8f0);
        border-bottom-left-radius: 8px;
        border-bottom-right-radius: 8px;
    }
    .ql-toolbar {
        background: var(--background, #f8fafc);
        border-color: var(--border, #e2e8f0);
        border-top-left-radius: 8px;
        border-top-right-radius: 8px;
    }
    .preview-container {
        margin-top: 10px;
        border-radius: 8px;
        overflow: hidden;
    }
    .preview-img {
        width: 100%;
        height: auto;
        object-fit: cover;
        max-height: 300px;
    }
</style>
<section class="section">
    <div class="container">
        <div class="form-card">
            <div class="form-header">
                <a href="/articles" class="back-link">← Kembali</a>
                <h1 class="form-title">
                    {{ if .is_edit }} ✏️ Edit Artikel {{ else }} 📝 Tulis
                    Artikel Baru {{ end }}
                </h1>
            </div>

            {{ if .error }}
            <div class="alert alert-error">
                <span class="alert-icon">⚠️</span>
                <span>{{ .error }}</span>
            </div>
            {{ end }}

            <form
                method="POST"
                action="{{ if .is_edit }}/articles/{{ .article.ID }}/edit{{ else }}/articles/create{{ end }}"
                class="article-form"
                enctype="multipart/form-data"
                id="article-form"
            >
                <div class="form-group">
                    <label for="cover_image" class="form-label"
                        >Gambar Cover (Opsional)</label
                    >
                    <input
                        type="file"
                        id="cover_image"
                        name="cover_image"
                        class="form-input"
                        accept="image/*"
                        onchange="previewImage(this)"
                    />
                    <div
                        id="image-preview-container"
                        class="preview-container"
                        {{
                        if
                        .is_edit
                        }}{{
                        if
                        .article.CoverImage
                        }}style="display: block;"
                        {{
                        else
                        }}style="display: none;"
                        {{
                        end
                        }}{{
                        else
                        }}style="display: none;"
                        {{
                        end
                        }}
                    >
                        <img
                            id="image-preview"
                            src="{{ if .is_edit }}{{ .article.CoverImage }}{{ end }}"
                            alt="Cover Preview"
                            class="preview-img"
                        />
                    </div>
                </div>

                <div class="form-group">
                    <label for="title" class="form-label">Judul Artikel</label>
                    <input
                        type="text"
                        id="title"
                        name="title"
                        class="form-input"
                        placeholder="Masukkan judul artikel yang menarik..."
                        value="{{ if .is_edit }}{{ .article.Title }}{{ end }}"
                        required
                        maxlength="200"
                    />
                    <small
                        class="form-hint"
                        style="
                            color: var(--text-muted, #64748b);
                            font-size: 0.8rem;
                            margin-top: 5px;
                            display: block;
                        "
                        id="title-counter"
                        >0 / 200 karakter</small
                    >
                </div>
                <div class="form-group">
                    <label for="content" class="form-label">Konten</label>
                    <input
                        type="hidden"
                        name="content"
                        id="hidden-content"
                        value="{{ if .is_edit }}{{ .article.Content }}{{ end }}"
                    />
                    <div id="editor-container"></div>
                </div>
                <div class="form-actions">
                    <a href="/articles" class="btn btn-outline">Batal</a>
                    <button
                        type="submit"
                        class="btn btn-primary"
                        id="submit-btn"
                        onclick="submitForm(event)"
                    >
                        {{ if .is_edit }}
                        <span>💾 Simpan Perubahan</span>
                        {{ else }}
                        <span>🚀 Publikasikan</span>
                        {{ end }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script>
    var toolbarOptions = [
        [{ header: [1, 2, 3, false] }],
        ['bold', 'italic', 'underline', 'strike'],
        ['blockquote', 'code-block'],
        [{ list: 'ordered' }, { list: 'bullet' }],
        [{ script: 'sub' }, { script: 'super' }],
        [{ indent: '-1' }, { indent: '+1' }],
        ['link', 'image', 'video'],
        ['clean'],
    ];

    var quill = new Quill('#editor-container', {
        theme: 'snow',
        placeholder: 'Tulis konten artikel Anda di sini...',
        modules: {
            toolbar: toolbarOptions,
        },
    });

    var hiddenContent = document.getElementById('hidden-content');
    if (hiddenContent.value) {
        const delta = quill.clipboard.convert(hiddenContent.value);
        quill.setContents(delta, 'silent');
    }

    var titleInput = document.getElementById('title');
    var titleCounter = document.getElementById('title-counter');
    function updateCounter() {
        titleCounter.textContent = titleInput.value.length + ' / 200 karakter';
    }
    titleInput.addEventListener('input', updateCounter);
    updateCounter();

    function previewImage(input) {
        var container = document.getElementById('image-preview-container');
        var img = document.getElementById('image-preview');
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function (e) {
                img.src = e.target.result;
                container.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        } else {
            container.style.display = 'none';
            img.src = '';
        }
    }

    function submitForm(e) {
        hiddenContent.value = quill.root.innerHTML;

        if (quill.getText().trim().length === 0) {
            e.preventDefault();
            alert('Konten artikel tidak boleh kosong!');
            return false;
        }

        var btn = document.getElementById('submit-btn');
        btn.innerHTML = '<span>⏳ Memproses...</span>';
        btn.style.opacity = '0.7';
        btn.style.cursor = 'not-allowed';
        return true;
    }
</script>
{{ template "footer" . }}
